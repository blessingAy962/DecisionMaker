<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Decision Maker</title><!-- Turns the website into a Web App -->
<link rel="manifest" href="manifest.json">
<!-- Makes the top status bar on Android match your app's dark theme -->
<meta name="theme-color" content="#0f172a">
<!-- Makes it look like a native app on iPhones -->
<meta name="apple-mobile-web-app-capable" content="yes"><script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: #1e293b;
            --text-main: #f8fafc;
            --accent: #38bdf8;
            --accent-hover: #0ea5e9;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
            margin-top: 20px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            font-size: 14px;
            color: #94a3b8;
            margin-top: 5px;
        }

        /* The Wheel Container */
        .wheel-container {
            position: relative;
            width: 320px;
            height: 320px;
            margin-bottom: 30px;
        }

        canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-shadow: 0 0 30px rgba(56, 189, 248, 0.2);
            transition: transform 0s; /* Handled by JS */
        }

        /* The Pointer Arrow */
        .pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 30px solid #f87171;
            z-index: 10;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.5));
        }

        /* UI Controls */
        .controls {
            width: 100%;
            max-width: 400px;
            background: var(--panel-bg);
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .input-group {
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 15px;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            font-size: 16px;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: var(--accent);
        }

        .btn {
            background: var(--accent);
            color: #0f172a;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn:hover {
            background: var(--accent-hover);
        }

        .btn-spin {
            background: linear-gradient(135deg, #38bdf8, #818cf8);
            color: white;
            padding: 15px;
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(56, 189, 248, 0.4);
        }

        .btn-spin:active {
            transform: scale(0.98);
        }

        #result {
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            color: #f1f5f9;
            min-height: 30px;
            margin-top: 10px;
        }

        /* Quick Option Tags */
        .option-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-top: 10px;
        }

        .option-tag {
            background: #334155;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .delete-tag {
            color: #f87171;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body><!-- The Personalized Greeting -->
<h3 id="greetingMessage" style="text-align: center; color: #0ea5e9; font-weight: bold; display: none; margin-top: 20px;"></h3>

<!-- The Welcome Popup Modal -->
<div id="welcomeModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.9); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(5px);">
    <div style="background: #1e293b; padding: 30px; border-radius: 15px; text-align: center; color: white; width: 85%; max-width: 350px; box-shadow: 0 10px 25px rgba(0,0,0,0.5);">
        <h2 style="margin-bottom: 10px; color: #fff;">Welcome! 👋</h2>
        <p style="color: #94a3b8; font-size: 14px; margin-bottom: 20px;">What should I call you?</p>
        <input type="text" id="userNameInput" placeholder="Enter your name..." style="width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 8px; border: none; font-size: 16px; background: #334155; color: white; outline: none; text-align: center;">
        <button onclick="saveName()" style="background: #0ea5e9; color: white; padding: 12px 20px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; width: 100%; box-shadow: 0 4px 15px rgba(14, 165, 233, 0.4);">Let's Spin</button>
    </div>
</div>

    <div class="header">
        <h1>Ultimate Decision Maker</h1>
        <p>Can't decide? Let the wheel choose.</p><input type="text" id="wheelTitle" placeholder="Tap to add a title (e.g. Messi vs Ronaldo)..." style="width: 90%; max-width: 400px; text-align: center; background: transparent; border: none; border-bottom: 2px dashed #38bdf8; color: #f8fafc; font-size: 22px; font-weight: bold; margin-top: 15px; margin-bottom: 10px; padding: 10px; outline: none;">
    </div>

    <div class="wheel-container">
        <div class="pointer"></div>
        <canvas id="wheelCanvas" width="400" height="400"></canvas>
    </div>

    <div class="controls">
        <div id="result">Ready to spin!</div>
        
        <button class="btn btn-spin" id="spinBtn">SPIN THE WHEEL</button>

        <div class="input-group">
            <input type="text" id="newOption" placeholder="Add a new option...">
            <button class="btn" id="addBtn">Add</button>
        </div><!-- Viral WhatsApp Share Button -->
<button onclick="shareToWhatsApp()" style="background: #25D366; color: white; padding: 12px 20px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; width: 100%; margin-top: 20px; box-shadow: 0 4px 15px rgba(37, 211, 102, 0.4); cursor: pointer;">
    🟢 Share App on WhatsApp
</button>

        <div class="option-list" id="optionTags">
            <!-- Tags generated by JS -->
        </div>
    </div>

    <script>
        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        const spinBtn = document.getElementById('spinBtn');
        const addBtn = document.getElementById('addBtn');
        const newOptionInput = document.getElementById('newOption');
        const resultDisplay = document.getElementById('result');
        const optionTagsContainer = document.getElementById('optionTags');

        // Initial default options
        let options = ["Pizza", "Burgers", "Tacos", "Sushi", "Salad", "Steak"];
        // Premium color palette for the slices
        const colors = ["#ef4444", "#f97316", "#eab308", "#22c55e", "#06b6d4", "#6366f1", "#d946ef", "#f43f5e"];

        let currentAngle = 0;
        let isSpinning = false;

        function drawWheel() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const numOptions = options.length;
            const arcSize = (2 * Math.PI) / numOptions;

            for (let i = 0; i < numOptions; i++) {
                const angle = currentAngle + i * arcSize;
                
                // Draw slice
                ctx.beginPath();
                ctx.moveTo(200, 200);
                ctx.arc(200, 200, 200, angle, angle + arcSize);
                ctx.lineTo(200, 200);
                ctx.fillStyle = colors[i % colors.length];
                ctx.fill();
                ctx.stroke();

                // Draw text
                ctx.save();
                ctx.translate(200, 200);
                ctx.rotate(angle + arcSize / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = "#ffffff";
                ctx.font = "bold 20px -apple-system, sans-serif";
                ctx.fillText(options[i], 180, 7);
                ctx.restore();
            }
            updateTags();
        }

        function updateTags() {
            optionTagsContainer.innerHTML = '';
            options.forEach((opt, index) => {
                const tag = document.createElement('div');
                tag.className = 'option-tag';
                tag.innerHTML = `<span>${opt}</span> <span class="delete-tag" onclick="removeOption(${index})">×</span>`;
                optionTagsContainer.appendChild(tag);
            });
        }

        function addOption() {
            const val = newOptionInput.value.trim();
            if (val && options.length < 12) { // Cap at 12 to keep it looking good
                options.push(val);
                newOptionInput.value = '';
                drawWheel();
            } else if (options.length >= 12) {
                alert("Maximum of 12 options allowed!");
            }
        }

        window.removeOption = function(index) {
            if(options.length > 2) {
                options.splice(index, 1);
                drawWheel();
            } else {
                alert("You need at least 2 options to spin!");
            }
        }

        addBtn.addEventListener('click', addOption);
        
        // Let enter key add options too
        newOptionInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') addOption();
        });

        // The Spin Physics
        function spinWheel() {
            if (isSpinning || options.length < 2) return;
            isSpinning = true;
            resultDisplay.textContent = "Spinning...";
            
            // Randomize spin length and target
            const spinVelocity = Math.random() * 0.2 + 0.3; 
            const spinDuration = Math.random() * 3000 + 4000; // 4 to 7 seconds
            const start = performance.now();

            function animateSpin(currentTime) {
                const elapsed = currentTime - start;
                
                if (elapsed < spinDuration) {
                    // Ease-out function to slow down naturally
                    const progress = elapsed / spinDuration;
                    const easeOut = 1 - Math.pow(1 - progress, 3);
                    
                    currentAngle += spinVelocity * (1 - easeOut);
                    drawWheel();
                    requestAnimationFrame(animateSpin);
                } else {
                    isSpinning = false;
                    determineWinner();
                }
            }
            requestAnimationFrame(animateSpin);
        }

        function determineWinner() {
            const numOptions = options.length;
            const arcSize = (2 * Math.PI) / numOptions;
            
            // Normalize currentAngle to be between 0 and 2*PI
            const normalizedAngle = currentAngle % (2 * Math.PI);
            
            // Calculate which slice is at the top (270 degrees or 3*PI/2)
            // Because our drawing starts at 0 (right side), the pointer is at top (-PI/2 relative)
            let winningAngle = (1.5 * Math.PI - normalizedAngle + 2 * Math.PI) % (2 * Math.PI);
            let winningIndex = Math.floor(winningAngle / arcSize);
            
            resultDisplay.innerHTML = `Winner: <span style="color: var(--accent);">${options[winningIndex]}</span> 🎉`;
        }

        spinBtn.addEventListener('click', spinWheel);

        // Initial draw
        drawWheel();// --- APP MEMORY & WELCOME SYSTEM ---
window.onload = function() {
    let savedName = localStorage.getItem("decisionMakerUser");
    
    if (savedName) {
        // User has been here before, show greeting
        document.getElementById("greetingMessage").innerText = "Let's decide, " + savedName + "!";
        document.getElementById("greetingMessage").style.display = "block";
    } else {
        // First time user, show popup
        document.getElementById("welcomeModal").style.display = "flex";
    }
};

function saveName() {
    let nameBox = document.getElementById("userNameInput").value;
    if (nameBox.trim() !== "") {
        // Save name to device memory
        localStorage.setItem("decisionMakerUser", nameBox);
        // Hide popup and show greeting
        document.getElementById("welcomeModal").style.display = "none";
        document.getElementById("greetingMessage").innerText = "Let's decide, " + nameBox + "!";
        document.getElementById("greetingMessage").style.display = "block";
    }
}// --- VIRAL WHATSAPP SHARE ENGINE ---
function shareToWhatsApp() {
    // Check if they typed a custom challenge title
    let titleBox = document.getElementById("wheelTitle");
    let challenge = (titleBox && titleBox.value.trim() !== "") ? titleBox.value : "the Ultimate Decision Maker";
    
    // The exact link to your app
    let appLink = "https://blessingay962.github.io/DecisionMaker/";
    
    // The message that will auto-fill in their WhatsApp
    let textMessage = "I just used this AI app to settle '" + challenge + "'! 🔥 Spin the wheel yourself here: " + appLink;
    
    // Open WhatsApp
    let whatsappUrl = "https://api.whatsapp.com/send?text=" + encodeURIComponent(textMessage);
    window.open(whatsappUrl, "_blank");
}
    </script>
</body>
</html>
